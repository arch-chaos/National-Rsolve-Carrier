services:
  - type: web
    name: nrc-tms-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nrc-tms-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app

databases:
  - name: nrc-tms-db
    plan: free
    databaseName: nrc_tms
